name: Dependency Review
on:
  pull_request:

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Dependency Review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          # NOTE(soltysh): there is some confusion around the health status of this
          # library, see https://github.com/kubernetes/kubernetes/issues/138812
          # 1.10.0 and 1.10.1 should be avoided.
          deny-packages: pkg:golang/github.com/fsnotify/fsnotify@v1.10.0,pkg:golang/github.com/fsnotify/fsnotify@v1.10.1
