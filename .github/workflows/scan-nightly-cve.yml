name: "Nightly CVE Scan"

on:
  schedule:
    - cron: "0 3 * * *" ## Every day at 03:00 UTC
  workflow_dispatch: ## Allow manual triggering for testing and ad-hoc runs

permissions:
  contents: read

jobs:
  cve-scan:
    if: ${{ github.repository == 'zarf-dev/zarf' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write ## Required for SARIF upload to GitHub Code Scanning

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main

      - name: Setup golang
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      ## ── Tier 1: govulncheck ─────────────────────────────────────────────────
      ## Reports vulnerabilities in reachable code paths only (no noise from
      ## unreachable transitive deps). Informational only — does not fail the job.

      - name: Run govulncheck
        run: make scan-govulncheck

      - name: Upload govulncheck SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always() ## Upload even if the job fails later
        with:
          sarif_file: build/govulncheck.sarif
          category: govulncheck

      ## ── Tier 2: grype on the built binary ───────────────────────────────────
      ## Surfaces indirect-dependency CVEs that consumers of the Zarf binary may
      ## face. VEX statements in .vex/zarf.openvex.json suppress accepted findings.
      ## Fails the workflow on any un-suppressed High or Critical finding.

      - name: Install grype
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/main/install.sh \
            | sh -s -- -b /usr/local/bin

      - name: Build Zarf binary
        run: make build-cli-linux-amd

      - name: Run grype scan (fails on High+)
        id: grype
        run: make scan-grype

      - name: Upload grype SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4.36.2
        if: always()
        with:
          sarif_file: build/grype.sarif
          category: grype-binary

      - name: Check for orphaned VEX statements
        if: always()
        run: make vex-lint

      - name: Upload scan artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        if: always()
        with:
          name: cve-scan-results
          retention-days: 30
          path: |
            build/govulncheck.sarif
            build/grype.json
            build/grype.sarif
            build/zarf-known-cves.csv

      - name: Send trigger to Slack on workflow failure
        if: failure()
        uses: ./.github/actions/slack
        with:
          slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
