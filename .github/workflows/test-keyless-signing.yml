name: Test Keyless Package Signing

on:
  pull_request:
    paths:
      - "src/pkg/signing/**"
      - "src/cmd/package.go"
  merge_group:

permissions:
  contents: read

concurrency:
  group: test-keyless-signing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-keyless-sign:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Build Zarf
        run: make build-cli-linux-amd

      - name: Create test package
        run: build/zarf package create src/test/packages/12-package-signing --confirm -o /tmp

      - name: Sign package (keyless)
        run: |
          build/zarf package sign /tmp/zarf-package-basic-signing-amd64.tar.zst \
            --keyless \
            --confirm
