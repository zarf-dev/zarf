name: Test Registry Proxy
on:
  pull_request:
    paths-ignore:
      - "**.md"
      - "**.jpg"
      - "**.png"
      - "**.gif"
      - "**.svg"
      - "adr/**"
      - "docs/**"
      - "CODEOWNERS"
  merge_group:
    paths-ignore:
      - "**.md"
      - "**.jpg"
      - "**.png"
      - "**.gif"
      - "**.svg"
      - "adr/**"
      - "docs/**"
      - "CODEOWNERS"

permissions:
  contents: read

# Abort prior jobs in the same workflow / PR
concurrency:
  group: proxy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build the binary and init package
  build-zarf:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup golang
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Build binary and zarf packages
        uses: ./.github/actions/packages

      # Upload the contents of the build directory for later stages to use
      - name: Upload build artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: build-artifacts
          path: build/
          retention-days: 1

  validate-proxy-kind:
    runs-on: ubuntu-latest
    needs: build-zarf
    strategy:
      fail-fast: false
      matrix:
        ipfamily: [ipv4, ipv6]
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-artifacts
          path: build/

      - name: setup kind config
        run: |
          cat <<EOF > kind-nftables-config.yml
          kind: Cluster
          apiVersion: kind.x-k8s.io/v1alpha4
          networking:
            kubeProxyMode: "nftables"
            ipFamily: ${{ matrix.ipfamily }}
          nodes:
          - role: control-plane
          - role: worker
          EOF

      - name: Setup Kind
        run: |
          kind delete cluster && kind create cluster --config=kind-nftables-config.yml

      - name: Setup golang
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Make Zarf executable
        run: |
          chmod +x build/zarf

      - name: Run proxy tests
        run: |
          make test-proxy
        env:
          NODEPORT_INCOMPATIBLE: "true"

      - name: get cluster info
        uses: ./.github/actions/debug-cluster
        if: failure()

  validate-proxy-k3d:
    runs-on: ubuntu-latest
    needs: build-zarf
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: build-artifacts
          path: build/

      - name: Setup K3d
        uses: ./.github/actions/k3d

      - name: Setup golang
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod

      - name: Make Zarf executable
        run: |
          chmod +x build/zarf

      - name: Run proxy tests
        run: |
          make test-proxy

      - name: get cluster info
        uses: ./.github/actions/debug-cluster
        if: failure()
