name: Test Import
on:
  pull_request:

permissions:
  contents: read

# Abort prior jobs in the same workflow / PR
concurrency:
  group: import-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-import:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: go.mod

      - name: Run test Go program that imports Zarf
        run: |
          cd $(mktemp -d)
          echo "$GO_MAIN" > main.go
          go mod init github.com/zarf-dev/test-import
          go mod edit -replace github.com/zarf-dev/zarf=github.com/${HEAD_REPO}@${COMMIT_SHA:0:12}
          go mod tidy
          cat go.mod | grep -q ${COMMIT_SHA:0:12}
          go run main.go
        env:
          COMMIT_SHA: ${{ github.event.pull_request.head.sha }}
          HEAD_REPO: ${{ github.event.pull_request.head.repo.full_name }}
          GO_MAIN: |
            package main

            import (
            	"fmt"

            	"github.com/zarf-dev/zarf/src/api/v1alpha1"
            	"github.com/zarf-dev/zarf/src/pkg/packager"
            )

            func main() {
            	fmt.Println(packager.PullOptions{})
            	fmt.Println(v1alpha1.ZarfComponent{})
            }
