apiVersion: zarf.dev/v1beta1
kind: ZarfInitConfig
metadata:
  name: init
  description: Used to establish a new Zarf cluster
  allowNamespaceOverride: false
  annotations:
    source: https://github.com/zarf-dev/zarf
    documentation: https://docs.zarf.dev

values:
  files:
    - values.yaml
  schema: values-schema.json

components:
  - name: k3s
    optional: true
    import:
      path: k3s/k3s.yaml

  - name: zarf-injector
    import:
      path: registry/zarf-injector.yaml

  - name: zarf-seed-registry
    import:
      path: registry/zarf-seed-registry.yaml
    images:
      - name: "[[ .registry.image ]]:[[ .registry.tag ]]"
      - name: "[[ .proxy.image ]]:[[ .proxy.tag ]]"

  - name: zarf-registry
    import:
      path: registry/zarf-registry.yaml
    images:
      - name: "[[ .registry.image ]]:[[ .registry.tag ]]"
      - name: "[[ .proxy.image ]]:[[ .proxy.tag ]]"

  - name: zarf-agent
    import:
      path: agent/zarf-agent.yaml
    images:
      - name: "[[ .agent.image ]]:[[ .agent.tag ]]"
        source: [[ if eq .agent.tag "local" ]]daemon[[ else ]]registry[[ end ]]
    actions:
      onCreate:
        before:
          - cmd: 'test "[[ .agent.tag ]]" != "local" || make build-local-agent-image AGENT_IMAGE_TAG="[[ .agent.tag ]]" ARCH="[[ .PKG.ARCH ]]"'
            shell:
              windows: pwsh
            dir: ../..
            template: true
            description: Build the local agent image (if 'agent.tag' was specified as 'local')

  - name: git-server
    optional: true
    import:
      path: git-server/gitea.yaml
    images:
      - name: "[[ .gitea.image ]]"
