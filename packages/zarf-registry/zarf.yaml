kind: ZarfPackageConfig
metadata:
  name: init-package-zarf-registry

values:
  files:
    - values/defaults.yaml

constants:
  - name: REGISTRY_IMAGE
    value: "###ZARF_PKG_TMPL_REGISTRY_IMAGE###"

  - name: REGISTRY_IMAGE_TAG
    value: "###ZARF_PKG_TMPL_REGISTRY_IMAGE_TAG###"

  - name: PROXY_IMAGE
    value: "###ZARF_PKG_TMPL_PROXY_IMAGE###"

  - name: PROXY_IMAGE_TAG
    value: "###ZARF_PKG_TMPL_PROXY_IMAGE_TAG###"

components:
  - name: zarf-injector
    description: |
      Bootstraps a Kubernetes cluster by cloning a running pod in the cluster and hosting the registry image.
      Removed and destroyed after the Zarf Registry is self-hosting the registry image.
    required: true
    only:
      cluster:
        architecture: amd64
    files:
      # Rust Injector Binary
      - source: https://github.com/zarf-dev/zarf-injector/releases/download/v0.3.0/zarf-injector-amd64
        target: "###ZARF_TEMP###/zarf-injector"
        shasum: "54c37ca19a101c795786510cb89cf4fe2aa7504d4c399985606a3d8f58f42119"
        executable: true

  - name: zarf-injector
    description: |
      Bootstraps a Kubernetes cluster by cloning a running pod in the cluster and hosting the registry image.
      Removed and destroyed after the Zarf Registry is self-hosting the registry image.
    required: true
    only:
      cluster:
        architecture: arm64
    files:
      # Rust Injector Binary
      - source: https://github.com/zarf-dev/zarf-injector/releases/download/v0.3.0/zarf-injector-arm64
        target: "###ZARF_TEMP###/zarf-injector"
        shasum: "7a677809accc0d3d9b1cddc8d6be07ebf0a883a1db887e50828bb3df0e824577"
        executable: true

  - name: zarf-seed-registry
    description: |
      Deploys the Zarf Registry using the registry image provided by the Zarf Injector.
    charts:
      - name: docker-registry
        releaseName: zarf-docker-registry
        localPath: chart
        version: 1.0.1
        namespace: zarf
        valuesFiles:
          - registry-values.yaml
          - registry-values-seed.yaml
        values:
          - sourcePath: .registry.pvc.enabled
            targetPath: .persistence.enabled
          - sourcePath: .registry.pvc.size
            targetPath: .persistence.size
          - sourcePath: .registry.pvc.accessMode
            targetPath: .persistence.accessMode
          - sourcePath: .registry.pvc.existingClaim
            targetPath: .persistence.existingClaim
          - sourcePath: .registry.resources.requests.cpu
            targetPath: .resources.requests.cpu
          - sourcePath: .registry.resources.requests.memory
            targetPath: .resources.requests.memory
          - sourcePath: .registry.resources.limits.cpu
            targetPath: .resources.limits.cpu
          - sourcePath: .registry.resources.limits.memory
            targetPath: .resources.limits.memory
          - sourcePath: .registry.hpa.enabled
            targetPath: .autoscaling.enabled
          - sourcePath: .registry.hpa.autoSize
            targetPath: .autoscaling.mapReplicasToNodes
          - sourcePath: .registry.hpa.min
            targetPath: .autoscaling.minReplicas
          - sourcePath: .registry.hpa.max
            targetPath: .autoscaling.maxReplicas
          - sourcePath: .registry.hpa.targetCPU
            targetPath: .autoscaling.targetCPUUtilizationPercentage
          - sourcePath: .registry.affinity.enabled
            targetPath: .affinity.enabled
          - sourcePath: .registry.affinity.custom
            targetPath: .affinity.custom
          - sourcePath: .registry.tolerations
            targetPath: .tolerations
          - sourcePath: .registry.nodeSelector
            targetPath: .nodeSelector
          - sourcePath: .registry.proxy.tolerations
            targetPath: .proxy.tolerations
          - sourcePath: .registry.proxy.hostNetwork
            targetPath: .proxy.hostNetwork
          - sourcePath: .registry.caBundle
            targetPath: .caBundle
          - sourcePath: .registry.extraEnvs
            targetPath: .extraEnvVars
          - sourcePath: .registry.otelExporter
            targetPath: .opentelemetry.exporter
          - sourcePath: .registry.serviceAccount.create
            targetPath: .serviceAccount.create
          - sourcePath: .registry.serviceAccount.name
            targetPath: .serviceAccount.name
          - sourcePath: .registry.serviceAccount.annotations
            targetPath: .serviceAccount.annotations
          - sourcePath: .registry.security.runAsUser
            targetPath: .securityContext.runAsUser
          - sourcePath: .registry.security.fsGroup
            targetPath: .securityContext.fsGroup
          - sourcePath: .registry.security.runAsGroup
            targetPath: .securityContext.runAsGroup
    images:
      # The seed image (or images) that will be injected (see zarf-config.toml)
      - "###ZARF_PKG_TMPL_REGISTRY_IMAGE_DOMAIN######ZARF_PKG_TMPL_REGISTRY_IMAGE###:###ZARF_PKG_TMPL_REGISTRY_IMAGE_TAG###"
      - "###ZARF_PKG_TMPL_PROXY_IMAGE_DOMAIN######ZARF_PKG_TMPL_PROXY_IMAGE###:###ZARF_PKG_TMPL_PROXY_IMAGE_TAG###"

  - name: zarf-registry
    description: |
      Updates the Zarf Registry to use the self-hosted registry image.
      Serves as the primary docker registry for the cluster.
    manifests:
      - name: registry-connect
        namespace: zarf
        files:
          - connect.yaml
      - name: kep-1755-registry-annotation
        namespace: zarf
        files:
          - configmap.yaml
    charts:
      - name: docker-registry
        releaseName: zarf-docker-registry
        localPath: chart
        version: 1.0.1
        namespace: zarf
        valuesFiles:
          - registry-values.yaml
        values:
          - sourcePath: .registry.pvc.enabled
            targetPath: .persistence.enabled
          - sourcePath: .registry.pvc.size
            targetPath: .persistence.size
          - sourcePath: .registry.pvc.accessMode
            targetPath: .persistence.accessMode
          - sourcePath: .registry.pvc.existingClaim
            targetPath: .persistence.existingClaim
          - sourcePath: .registry.resources.requests.cpu
            targetPath: .resources.requests.cpu
          - sourcePath: .registry.resources.requests.memory
            targetPath: .resources.requests.memory
          - sourcePath: .registry.resources.limits.cpu
            targetPath: .resources.limits.cpu
          - sourcePath: .registry.resources.limits.memory
            targetPath: .resources.limits.memory
          - sourcePath: .registry.hpa.enabled
            targetPath: .autoscaling.enabled
          - sourcePath: .registry.hpa.autoSize
            targetPath: .autoscaling.mapReplicasToNodes
          - sourcePath: .registry.hpa.min
            targetPath: .autoscaling.minReplicas
          - sourcePath: .registry.hpa.max
            targetPath: .autoscaling.maxReplicas
          - sourcePath: .registry.hpa.targetCPU
            targetPath: .autoscaling.targetCPUUtilizationPercentage
          - sourcePath: .registry.affinity.enabled
            targetPath: .affinity.enabled
          - sourcePath: .registry.affinity.custom
            targetPath: .affinity.custom
          - sourcePath: .registry.tolerations
            targetPath: .tolerations
          - sourcePath: .registry.nodeSelector
            targetPath: .nodeSelector
          - sourcePath: .registry.proxy.tolerations
            targetPath: .proxy.tolerations
          - sourcePath: .registry.proxy.hostNetwork
            targetPath: .proxy.hostNetwork
          - sourcePath: .registry.caBundle
            targetPath: .caBundle
          - sourcePath: .registry.extraEnvs
            targetPath: .extraEnvVars
          - sourcePath: .registry.otelExporter
            targetPath: .opentelemetry.exporter
          - sourcePath: .registry.serviceAccount.create
            targetPath: .serviceAccount.create
          - sourcePath: .registry.serviceAccount.name
            targetPath: .serviceAccount.name
          - sourcePath: .registry.serviceAccount.annotations
            targetPath: .serviceAccount.annotations
          - sourcePath: .registry.security.runAsUser
            targetPath: .securityContext.runAsUser
          - sourcePath: .registry.security.fsGroup
            targetPath: .securityContext.fsGroup
          - sourcePath: .registry.security.runAsGroup
            targetPath: .securityContext.runAsGroup
    images:
      # This image (or images) must match that used for injection (see zarf-config.toml)
      - "###ZARF_PKG_TMPL_REGISTRY_IMAGE_DOMAIN######ZARF_PKG_TMPL_REGISTRY_IMAGE###:###ZARF_PKG_TMPL_REGISTRY_IMAGE_TAG###"
      - "###ZARF_PKG_TMPL_PROXY_IMAGE_DOMAIN######ZARF_PKG_TMPL_PROXY_IMAGE###:###ZARF_PKG_TMPL_PROXY_IMAGE_TAG###"
