kind: ZarfPackageConfig
metadata:
  name: argocd
  description: Example showcasing installing ArgoCD

components:
  - name: argocd-helm-chart
    required: true
    charts:
      - name: argo-cd
        version: 5.54.0
        namespace: argocd
        url: https://argoproj.github.io/argo-helm
        releaseName: argocd-baseline
        valuesFiles:
          - baseline/values.yaml
    images:
      - docker.io/library/redis:7.0.15-alpine
      - quay.io/argoproj/argocd:v2.9.6
      # Cosign artifacts for images - argocd - argocd-helm-chart
      - quay.io/argoproj/argocd:sha256-2dafd800fb617ba5b16ae429e388ca140f66f88171463d23d158b372bb2fae08.sig
      - quay.io/argoproj/argocd:sha256-2dafd800fb617ba5b16ae429e388ca140f66f88171463d23d158b372bb2fae08.att
  - name: argocd-apps
    required: true
    charts:
      - name: argocd-apps
        version: 2.0.4
        namespace: podinfo
        url: https://argoproj.github.io/argo-helm
        releaseName: argocd-apps
        valuesFiles:
          - apps/values.yaml
    repos:
      - https://github.com/stefanprodan/podinfo.git
    images:
      - ghcr.io/stefanprodan/podinfo:6.4.0
    actions:
      onDeploy:
        after:
          # This will use a wait action to wait for the pods to be ready
          - description: Podinfo pod to be ready via wait action
            wait:
              cluster:
                kind: pod
                name: app.kubernetes.io/name=podinfo
                namespace: podinfo
                condition: ready
  - name: argocd-applicationset
    required: true
    charts:
      - name: argocd-apps
        version: 2.0.4
        namespace: guestbook
        url: https://argoproj.github.io/argo-helm
        releaseName: argocd-apps
        valuesFiles:
          - applicationset/values.yaml
    repos:
      - https://github.com/argoproj/argocd-example-apps.git@0d521c6e049889134f3122eb32d7ed342f43ca0d
    images:
      - gcr.io/google-samples/gb-frontend:v5
    actions:
      onDeploy:
        after:
          - description: Guestbook UI pod to be ready via wait action
            wait:
              cluster:
                kind: pod
                name: app=guestbook-ui
                namespace: guestbook
                condition: ready

documentation:
  readme: readme.md
