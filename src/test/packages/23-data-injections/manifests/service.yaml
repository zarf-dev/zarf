apiVersion: v1
kind: Service
metadata:
  name: file-server
  annotations:
    zarf.dev/connect-description: "View the injected files"
  labels:
    zarf.dev/connect-name: file-server
spec:
  selector:
    app: file-server
  ports:
    - name: http
      port: 8080
      protocol: TCP
      targetPort: http
