apiVersion: v1
kind: Namespace
metadata:
  name: manifest-adoption
  labels:
    keep-this: label
  annotations:
    keep-this: annotation
---
# A normal deployment that should be "adopted" by Helm/Zarf
apiVersion: apps/v1
kind: Deployment
metadata:
  name: game
  namespace: manifest-adoption
spec:
  selector:
    matchLabels:
      app: game
  template:
    metadata:
      labels:
        app: game
    spec:
      containers:
        - name: multi-game
          image: "ghcr.io/zarf-dev/doom-game:0.0.1"
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          resources:
            requests:
              memory: "32Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "250m"
---
# A cluster-scoped resource that should be "adopted" by Helm/Zarf
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: zarf-adoption-test
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list"]
