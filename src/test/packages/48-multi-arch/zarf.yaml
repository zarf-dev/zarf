kind: ZarfPackageConfig
metadata:
  name: multi-arch
  description: Deploy a digest-pinned and a tag-only multi-arch image on any cluster architecture.
  version: 0.0.1
  architecture: multi

components:
  - name: podinfo
    required: true
    images:
      - ghcr.io/stefanprodan/podinfo:6.4.0@sha256:57a654ace69ec02ba8973093b6a786faa15640575fbf0dbb603db55aca2ccec8
      - ghcr.io/stefanprodan/podinfo:6.5.0
    manifests:
      - name: podinfo
        namespace: multi-arch-test
        files:
          - pod.yaml
