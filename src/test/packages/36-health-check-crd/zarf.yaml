kind: ZarfPackageConfig
metadata:
  name: health-check-crd
  description: Regression test for health checking a CRD registered earlier in the same deploy

components:
  # Forces the shared status watcher's RESTMapper to cache a discovery snapshot
  # taken before the CRD below exists.
  - name: seed-cache
    required: true
    manifests:
      - name: seed
        namespace: health-check-crd
        files:
          - seed-configmap.yaml

  # Registers the CRD via a chart crds/ directory, the way real charts ship CRDs.
  # Helm installs and establishes crds/ objects but leaves them out of the release
  # manifest, so the status watcher never observes the CustomResourceDefinition
  # and never resets its RESTMapper cache - the condition that surfaces the bug.
  - name: install-crd
    required: true
    charts:
      - name: crd-chart
        namespace: health-check-crd
        localPath: crd-chart
        version: 0.1.0

  # Health checks a custom resource of the CRD above. A RESTMapper that caches
  # discovery on first use and never reloads cannot map this kind, so this check
  # hangs until the deploy times out.
  - name: health-check-cr
    required: true
    manifests:
      - name: cr
        namespace: health-check-crd
        files:
          - cr.yaml
    healthChecks:
      - name: regression
        namespace: health-check-crd
        apiVersion: test.zarf.dev/v1alpha1
        kind: ZarfRegression
