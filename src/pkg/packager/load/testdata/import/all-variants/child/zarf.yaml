kind: ZarfPackageConfig
metadata:
  name: example-package-flavors-child

constants:
  - name: TEST_CONST
    value: "foo"
variables:
  - name: TEST_VAR

components:
  - name: has-no-flavor

  - name: child-has-flavor
    only:
      flavor: pistachio

  - name: different-child-flavor
    only:
      flavor: seaweed

  - name: arches
    only:
      cluster:
        architecture: amd64

  - name: arches
    only:
      cluster:
        architecture: arm64
