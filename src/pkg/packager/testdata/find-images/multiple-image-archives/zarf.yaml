kind: ZarfPackageConfig
metadata:
  name: image-archive
  description: image archive
components:
  - name: manifest-referencing-image-in-archive
    required: true
    manifests:
      - name: scratch-manifest
        namespace: default
        files:
          - deployment.yaml
  - name: manifest-referencing-scratch-other-image-in-archive
    required: true
    manifests:
      - name: scratch-other-manifest
        namespace: default
        files:
          - ./deployment-scratch-other.yaml
  - name: manifest-referencing-image-not-in-archive
    required: true
    manifests:
      - name: alpine-manifest
        namespace: default
        files:
          - deployment-alpine.yaml
  - name: image-archive-component
    imageArchives:
      - images: []
        path: sub/scratch.tar
      - images: []
        path: scratch-other.tar
