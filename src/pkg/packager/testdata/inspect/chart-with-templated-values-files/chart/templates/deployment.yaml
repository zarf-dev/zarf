apiVersion: apps/v1
kind: Deployment
metadata:
  name: test
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: test
  template:
    metadata:
      labels:
        app: test
    spec:
      containers:
        - name: test
          image: nginx:{{ .Values.tag }}
          env:
            - name: STATIC_FIELD
              value: {{ .Values.staticField | quote }}
