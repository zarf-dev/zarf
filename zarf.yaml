kind: ZarfInitConfig
metadata:
  name: init
  description: Used to establish a new Zarf cluster
  allowNamespaceOverride: false

components:
  - name: k3s
    import:
      path: packages/distros/k3s

  # This package moves the injector & registries binaries
  - name: zarf-injector
    required: true
    import:
      path: packages/zarf-registry

  # Creates the temporary seed-registry
  - name: zarf-seed-registry
    required: true
    import:
      path: packages/zarf-registry

  # Creates the permanent registry
  - name: zarf-registry
    required: true
    import:
      path: packages/zarf-registry

  # Creates the pod+git mutating webhook
  - name: zarf-agent
    required: true
    import:
      path: packages/zarf-agent

  # (Optional) Adds a git server to the cluster
  - name: git-server
    import:
      path: packages/gitea

# VEX document shipped with the init package so consumers can reproduce Zarf's
# accepted-CVE posture when scanning the init package or its components with grype.
# Retrieve with: zarf package inspect <init-package> --get-documentation zarf.openvex.json
documentation:
  zarf.openvex.json: .vex/zarf.openvex.json
